<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Page Not Found | ARTIFICE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
        }
        .grain-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            filter: contrast(150%) brightness(1000%);
        }
    </style>
</head>

<body class="bg-[#f9fafb] text-zinc-950 antialiased overflow-hidden selection:bg-zinc-900 selection:text-white">
    <div class="grain-overlay"></div>

    <main class="h-screen w-full flex flex-col items-center justify-center px-6 text-center">
        <div class="flex flex-col items-center max-w-xl">
            <span class="text-[10px] tracking-[0.4em] uppercase font-bold text-zinc-400 mb-8">Error 404</span>
            <h1 class="text-[clamp(3rem,8vw,6rem)] tracking-tighter font-light leading-none text-zinc-950 mb-8">
                Lost in the <br> <span class="italic text-zinc-300 font-light">Void.</span>
            </h1>
            <p class="text-zinc-500 font-light text-base leading-relaxed mb-12 max-w-sm">
                The space you are looking for has been moved or does not exist. Return to the gallery to continue your experience.
            </p>
            <a href="index.html" class="inline-flex items-center gap-4 text-xs tracking-widest uppercase font-semibold text-zinc-950 group">
                <span class="border-b-2 border-zinc-950 pb-1 group-hover:border-zinc-400 transition-colors">Back to Archive</span>
                <div class="w-10 h-10 rounded-full border border-zinc-200 flex items-center justify-center group-hover:bg-zinc-950 group-hover:text-white transition-all">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>
        </div>
    </main>

    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 text-[10px] tracking-widest uppercase text-zinc-300">
        © 2026 Artifice Gallery Ltd.
    </div>
</body>

</html>
